name: tflite_navigation_assistant
description: "TFLite-based mobile navigation assistance for blind/visually-impaired users."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera and image processing
  camera: ^0.10.5+5
  image: ^4.0.17
  
  # TensorFlow Lite
  tflite_flutter: ^0.10.4
  
  # Device sensors
  sensors_plus: ^1.4.0
  
  # Path provider for file access
  path_provider: ^2.0.15
  
  # Connectivity
  connectivity_plus: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    # Model assets
    - assets/models/custom_best.tflite
    - assets/models/yolov8n.tflite
    
    # Images and other assets
    - assets/images/
    
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

# Platform-specific settings
flutter_native_splash:
  color: "000000"
  image: assets/images/splash.png

# Flutter configuration
flutter_gen:
  output: lib/gen

# iOS specific settings
ios:
  min_version: 11.0

# Android specific settings
android:
  min_sdk_version: 21
