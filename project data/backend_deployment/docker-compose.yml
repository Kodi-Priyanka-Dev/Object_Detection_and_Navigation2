version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NAV_FOCAL_LENGTH_PX=800
      - NAV_DOOR_WIDTH_M=0.9
      - NAV_DOOR_HEIGHT_M=2.0
    volumes:
      - ./models:/app/models
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

# Usage:
# docker-compose up --build
# Access at http://localhost:8080
